<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitud de Compra de Mercancía</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <form id="miFormulario">
            
            <div class="form-header">
                <img src="LogoMh.png" alt="Logo Mil Herrajes" class="form-logo">
                <h2>Solicitud de Mercancía</h2>
            </div>
            
            <div class="form-group">
                <label for="fechaSolicitud">Fecha de Solicitud</label>
                <input type="date" id="fechaSolicitud" required>
            </div>

            <div class="form-group">
                <label for="agencia">Agencia Solicitante</label>
                <select id="agencia" required>
                    <option value="" disabled selected>Selecciona una agencia...</option>
                    <option value="Bucaramanga - Mil Herrajes">Bucaramanga - Mil Herrajes</option>
                    <option value="Bucaramanga - Metroadornos">Bucaramanga - Metroadornos</option>
                    <option value="Bucaramanga - Metroherrajes">Bucaramanga - Metroherrajes</option>
                    <option value="Bucaramanga - Casablanca">Bucaramanga - Casablanca</option>
                    <option value="Barranquilla - Mil Herrajes">Barranquilla - Mil Herrajes</option>
                    <option value="Valledupar - Centroadornos">Valledupar - Centroadornos</option>
                    <option value="Sincelejo - Centroherrajes">Sincelejo - Centroherrajes</option>
                    <option value="Bogota - Mil Herrajes - centro">Bogota - Mil Herrajes - centro</option>
                    <option value="Bogota - Mil Herrajes - calle 18">Bogota - Mil Herrajes - calle 18</option>
                    <option value="Bogota - Mil Herrajes - calle 16">Bogota - Mil Herrajes - calle 16</option>
                    <option value="Bogota - Centroadornos">Bogota - Centroadornos</option>
                    <option value="Cucuta - Peleteria">Cucuta - Peleteria</option>
                    <option value="Cucuta - Cacharreria">Cucuta - Cacharreria</option>
                    <option value="Cali - Mil Herrajes">Cali - Mil Herrajes</option>
                    <option value="Cali Centroherrajes">Cali Centroherrajes</option>
                </select>
            </div>

            <div class="form-group">
                <label for="solicitadoPor">Solicitado Por</label>
                <input type="text" id="solicitadoPor" placeholder="Tu nombre completo" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="proveedor">Proveedor Sugerido</label>
                    <input type="text" id="proveedor" placeholder="Nombre de la empresa/proveedor" required>
                </div>
                <div class="form-group">
                    <label for="contactoProveedor">Contacto Proveedor</label>
                    <input type="text" id="contactoProveedor" placeholder="Teléfono o correo" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="producto">Producto</label>
                    <input type="text" id="producto" placeholder="Nombre del producto" required>
                </div>
                <div class="form-group">
                    <label for="referencia">Referencia</label>
                    <input type="text" id="referencia" placeholder="Código o referencia" required>
                </div>
                <div class="form-group cantidad-group">
                    <label for="cantidad">Cantidad</label>
                    <input type="number" id="cantidad" min="1" placeholder="0" required>
                </div>
            </div>

            <div class="form-group">
                <label for="caracteristica">Características del Insumo</label>
                <input type="text" id="caracteristica" placeholder="Color, tamaño, material, etc." required>
            </div>

            <div class="form-group">
                <label for="justificacion">Justificación de la Compra</label>
                <textarea id="justificacion" rows="3" placeholder="Explica por qué se requiere este insumo..." required></textarea>
            </div>

            <button type="submit" id="btnEnviar">Enviar Solicitud</button>
        </form>
    </div>

    <div id="modalEstado" class="modal-container">
        <div class="modal-content">
            <div id="modalIcono" class="modal-icono">🚚</div>
            <p id="modalMensaje">Enviando formulario, por favor espere...</p>
            <button id="btnModalAceptar" class="btn-modal" style="display: none;">Aceptar</button>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
